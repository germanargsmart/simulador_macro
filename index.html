<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Macroeconomía · CIAS</title>
<style>
:root{--ink:#14263c;--teal:#0e7c6b;--teal-d:#0a5c50;--paper:#f6f7f5;--card:#ffffff;--line:#dfe4e0;--ok:#1e8e5a;--bad:#c0392b;--amber:#b97a12;--mut:#66727e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:28px 18px 60px}
header{border-bottom:3px solid var(--teal);padding-bottom:14px;margin-bottom:22px}
.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);font-weight:700}
h1{font-family:Georgia,'Times New Roman',serif;font-size:clamp(24px,4vw,34px);font-weight:700;margin-top:4px}
.sub{color:var(--mut);font-size:14px;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin-top:6px}
.tcard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px;cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative}
.tcard:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(20,38,60,.08)}
.tcard h3{font-family:Georgia,serif;font-size:19px}
.tcard .n{font-size:12px;color:var(--mut);margin-top:2px}
.score{margin-top:12px;font-size:13px;font-weight:700;color:var(--teal-d)}
.score.empty{color:var(--mut);font-weight:400}
.badge{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--mut)}
.badge.done{border-color:var(--teal);color:var(--teal-d)}
.chip{display:inline-block;background:#e7f1ee;color:var(--teal-d);font-size:11px;font-weight:700;letter-spacing:.06em;padding:3px 9px;border-radius:99px;text-transform:uppercase}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:22px;margin-top:16px}
.qnum{font-size:12px;color:var(--mut);font-weight:600}
.qtext{font-family:Georgia,serif;font-size:18px;margin:10px 0 16px}
.opt{display:block;width:100%;text-align:left;background:var(--paper);border:1.5px solid var(--line);border-radius:8px;padding:12px 14px;margin-top:9px;cursor:pointer;font-size:15px;font-family:inherit;color:var(--ink);transition:border-color .1s,background .1s}
.opt:hover{border-color:var(--teal)}
.opt.sel{border-color:var(--teal);background:#e7f1ee;font-weight:600}
.opt .key{font-weight:700;color:var(--teal-d);margin-right:8px}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:10px}
button.btn{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
button.btn:hover{background:var(--teal-d)}
button.btn.ghost{background:transparent;color:var(--teal-d);border:1.5px solid var(--teal)}
button.btn:disabled{opacity:.35;cursor:default}
.dots{display:flex;flex-wrap:wrap;gap:5px;margin-top:16px}
.dot{width:22px;height:22px;border-radius:5px;border:1px solid var(--line);background:var(--card);font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mut)}
.dot.ans{background:var(--teal);border-color:var(--teal);color:#fff}
.dot.cur{outline:2px solid var(--ink)}
.progress{height:5px;background:var(--line);border-radius:99px;margin-top:14px;overflow:hidden}
.progress i{display:block;height:100%;background:var(--teal);border-radius:99px;transition:width .2s}
.result-hero{background:var(--ink);color:#fff;border-radius:10px;padding:26px;margin-top:16px}
.result-hero .big{font-family:Georgia,serif;font-size:42px;font-weight:700}
.result-hero .lab{font-size:13px;opacity:.75;letter-spacing:.1em;text-transform:uppercase}
.verdict{margin-top:8px;font-size:15px}
.rev{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:8px;padding:16px 18px;margin-top:12px}
.rev.ok{border-left-color:var(--ok)}
.rev.bad{border-left-color:var(--bad)}
.rev .q{font-weight:600;font-size:15px;margin-bottom:8px}
.rev .a{font-size:14px;margin-top:4px}
.rev .a b{font-weight:700}
.rev .a.user-bad{color:var(--bad)}
.rev .a.correct{color:var(--ok)}
.rev .exp{font-size:13.5px;color:var(--mut);margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
.mark{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.mark.ok{color:var(--ok)}.mark.bad{color:var(--bad)}
.back{margin-top:22px}
footer{margin-top:40px;font-size:12px;color:var(--mut);border-top:1px solid var(--line);padding-top:12px}
@media (max-width:520px){.qtext{font-size:16.5px}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
// ====== BANCO DE PREGUNTAS ======
// c: clase | q: pregunta | o: opciones (la primera es la correcta; se barajan al cargar) | e: explicación
const BANK=[
// ---- CLASE 1 ----
{c:1,q:"Un funcionario dedica su sábado a un curso gratuito de formación. ¿Cuál es el costo de oportunidad relevante de esa decisión?",o:["El valor de la mejor alternativa a la que renuncia ese sábado (descanso, trabajo remunerado, familia)","Cero, porque el curso es gratuito","El costo del transporte hasta el curso, único gasto de bolsillo","La suma de todos los usos alternativos posibles del sábado"],e:"El costo de oportunidad es el valor de la MEJOR alternativa resignada, no el gasto monetario ni la suma de todas las alternativas."},
{c:1,q:"En una economía privada agregada sin Estado, la identidad S = I implica que:",o:["Todo lo que el sector privado no consume se canaliza contablemente a inversión","Los individuos deciden ahorrar exactamente lo que las empresas desean invertir","El ahorro causa la inversión: si sube S, automáticamente sube I por decisión de las empresas","La economía está siempre en pleno empleo"],e:"Es una identidad contable (Y − C = S = I), no una relación de comportamiento ni causal: no dice nada sobre decisiones ni sobre pleno empleo."},
{c:1,q:"Un país reduce su déficit fiscal de 4% a 1% del PBI. Sobre su deuda pública puede afirmarse que:",o:["Sigue creciendo, aunque más despacio: el déficit (flujo) sigue sumando al stock","Cae, porque el déficit bajó","Queda constante, porque déficit y deuda son la misma variable","Cae en términos nominales pero sube en términos reales"],e:"Trampa stock/flujo: mientras haya déficit (flujo negativo), el stock de deuda sigue aumentando; solo baja con superávit."},
{c:1,q:"El salario nominal sube 60% en un año y el índice de precios sube 90%. El salario real:",o:["Cayó aproximadamente 16% (1,6/1,9 − 1)","Subió 60%, porque el trabajador cobra más pesos","Cayó 30 puntos porcentuales exactos (90 − 60)","No puede calcularse sin conocer el salario en dólares"],e:"Salario real = nominal/precios: 1,60/1,90 ≈ 0,84 → cae ~16%. Restar tasas (90−60) es una aproximación incorrecta con inflaciones altas."},
{c:1,q:"Si todos los precios de la economía y todos los ingresos se duplican exactamente, ¿qué ocurre con los precios relativos y el poder de compra?",o:["Los precios relativos y el poder de compra quedan iguales: solo cambió la unidad de medida","Los precios relativos se duplican y el poder de compra cae a la mitad","El poder de compra se duplica","Los precios relativos caen a la mitad"],e:"Los precios relativos son cocientes entre precios: si todo se multiplica por 2, los cocientes no cambian. Distinción precios absolutos vs. relativos."},
{c:1,q:"¿Cuál de las siguientes es una variable stock?",o:["Las reservas internacionales del BCRA al 30 de junio","Las exportaciones del segundo trimestre","La emisión monetaria de mayo","El déficit fiscal de 2025"],e:"Los stocks se miden en un momento dado (reservas, deuda, riqueza); exportaciones, emisión y déficit son flujos por período."},
{c:1,q:"Sube el precio de la carne y cae la cantidad de carne comprada. En el modelo de mercado, esto describe:",o:["Un movimiento a lo largo de la curva de demanda (cambio en la cantidad demandada)","Un desplazamiento de la curva de demanda hacia la izquierda","Un desplazamiento simultáneo de oferta y demanda","Una caída de la demanda por cambio de gustos"],e:"El precio del propio bien mueve la cantidad demandada SOBRE la curva; la curva se desplaza por ingreso, gustos, otros precios, expectativas."},
{c:1,q:"'Economía política', según el enfoque de la clase, refiere a que:",o:["El funcionamiento de la economía depende de los mecanismos institucionales/políticos con que la sociedad coordina agentes y recursos","La economía debe subordinarse a los objetivos del partido gobernante","La política no debe intervenir jamás en la economía","Es la rama que estudia solo las finanzas del Estado"],e:"Economía política = economía + instituciones y política que regulan el intercambio: leyes, incentivos, objetivos, capacidades."},
{c:1,q:"La escasez obliga a elegir. En política económica, esto significa que:",o:["Toda decisión de gobierno implica resignar algo: los trade-offs no desaparecen por decreto","Con suficiente voluntad política pueden lograrse todos los objetivos a la vez","Los trade-offs existen para individuos pero no para el Estado, que puede emitir","Solo hay trade-offs cuando hay déficit fiscal"],e:"El trade-off es universal: consumo, trabajo, producción y también política económica. El Estado no está exento de la escasez."},
{c:1,q:"¿Para qué sirve deflactar una serie con un índice de precios?",o:["Para expresarla a precios constantes y medir poder de compra o volumen real","Para eliminar la estacionalidad de la serie","Para convertirla a dólares","Para suavizar los picos del ciclo económico"],e:"Deflactar transforma valores nominales (precios corrientes) en reales (precios constantes). Desestacionalizar es otra operación distinta."},
// ---- CLASE 2 ----
{c:2,q:"'Cerrar la economía sube el PBI porque las importaciones restan en la fórmula.' El error del razonamiento es que:",o:["Las M se restan solo porque ya están sumadas dentro de C, I y G; restarlas evita contar producción extranjera, no castiga al PBI","Las importaciones en realidad se suman al PBI","La fórmula del PBI no incluye importaciones","Es correcto: todo país que cerró su economía aumentó su PBI"],e:"C, I y G incluyen bienes importados; M se resta para depurar. Cerrar la economía no aumenta el PBI y reduce eficiencia y bienestar."},
{c:2,q:"Una panadería compra harina por $100 y vende pan por $300. Su aporte al PBI por el método del valor agregado es:",o:["$200 (VBP menos insumos intermedios)","$300, el valor de sus ventas","$400, ventas más insumos","$100, el valor de los insumos"],e:"VA = VBP − insumos intermedios = 300 − 100. Sumar ventas completas duplicaría la harina ya contada en el molino."},
{c:2,q:"Que el PBI se pueda medir por gasto, valor agregado o ingreso, y dé lo mismo, refleja que:",o:["Son tres formas de contar el mismo flujo circular: todo lo producido se vende y genera ingresos equivalentes","Es una coincidencia estadística que a veces no se cumple","El método del ingreso es el verdadero y los otros lo aproximan","La economía está en equilibrio de pleno empleo"],e:"Es contabilidad nacional ('no es economía, es medición'): producción = gasto = ingreso por construcción."},
{c:2,q:"Dos países parten del mismo PBI per cápita; uno crece al 1% anual y otro al 3%. A los 70 años, aproximadamente:",o:["El segundo casi cuadruplica al primero: el interés compuesto amplifica diferencias 'chicas' de crecimiento","El segundo lo supera por 2 puntos porcentuales acumulados","Ambos convergen al mismo nivel en el largo plazo","El segundo lo duplica exactamente"],e:"Al 1% el PBI se multiplica ~×2 en 70 años; al 3%, ~×8. Pequeñas diferencias sostenidas generan brechas enormes: por eso importa la tendencia."},
{c:2,q:"¿Cuál de estos NO es un objetivo de política macroeconómica de corto plazo según el curso?",o:["Maximizar la recaudación tributaria","Actividad cerca de la tendencia y desempleo bajo","Deuda pública y cuentas externas sostenibles","Inflación baja"],e:"Los cuatro objetivos de CP son: actividad/empleo, deuda sostenible, cuentas externas sostenibles e inflación baja. Recaudar más no es un fin macro en sí."},
{c:2,q:"Una sequía histórica desploma la cosecha y eso reduce exportaciones, actividad y recaudación. En el esquema shock-propagación, es un shock:",o:["Exógeno que se propaga principalmente por el canal real","Endógeno de canal financiero","Endógeno de canal real","Exógeno de canal exclusivamente financiero"],e:"Se origina fuera del sistema económico (clima) y se transmite por producción, empleo y comercio: canal real."},
{c:2,q:"La economía está en recesión con capacidad ociosa (tramo keynesiano de la OA). Un aumento del gasto público tenderá a:",o:["Aumentar producción y empleo con poco efecto en precios","Aumentar solo los precios, sin efecto en la producción","Reducir la producción por expulsión total de inversión privada","No tener ningún efecto, porque los agentes lo anticipan siempre"],e:"Con precios rígidos y factores ociosos, la política de demanda mueve cantidades. En el tramo clásico (pleno empleo) movería solo precios."},
{c:2,q:"'La peor política económica posible', según la frase repetida del curso, es:",o:["Impulsar sistemáticamente la demanda agregada mientras se contrae o reprime la oferta agregada","Hacer ajuste fiscal en recesión","Dejar flotar el tipo de cambio","Subir la tasa de interés para bajar la inflación"],e:"Empujar la DA (gasto, emisión) reprimiendo a la vez la OA (controles, trabas, impuestos distorsivos) combina inflación con estancamiento."},
{c:2,q:"El PBI cayó durante todo 2024 pero terminó diciembre en un nivel alto. En 2025 la actividad queda plana todo el año y aun así el promedio anual crece. Eso se explica por:",o:["El efecto arrastre: el punto de partida alto ya 'garantiza' crecimiento promedio sin que pase nada nuevo","Un error de medición del INDEC","La estacionalidad de diciembre","El crecimiento del PBI nominal por inflación"],e:"El arrastre estadístico es la parte del crecimiento anual heredada de la trayectoria del año anterior."},
{c:2,q:"Para comparar la actividad de diciembre (aguinaldo, fiestas) contra noviembre, lo correcto es usar:",o:["La serie desestacionalizada, que remueve el patrón repetitivo de cada diciembre","La serie original, que muestra los datos 'verdaderos'","La variación interanual del PBI nominal","El promedio móvil de 10 años"],e:"Sin desestacionalizar, diciembre siempre 'crece' contra noviembre por el patrón estacional, no por mejora genuina."},
{c:2,q:"En el modelo C = Ca + c·Yd con Yd = Y − T + TR, una suba de impuestos T reduce el consumo porque:",o:["Baja el ingreso disponible y con él la parte inducida del consumo (c·Yd)","Baja el consumo autónomo Ca","Sube la propensión marginal a consumir","Reduce directamente la inversión, no el consumo"],e:"T entra por el ingreso disponible: menos Yd, menos consumo inducido. Ca y c son parámetros del modelo."},
{c:2,q:"En I = Ia − b·i, una suba de la tasa de interés reduce la inversión porque:",o:["Encarece el financiamiento y eleva la rentabilidad mínima exigida a los proyectos","Reduce el ahorro disponible de las familias","Aumenta la inversión autónoma","Aprecia el tipo de cambio"],e:"b mide la sensibilidad de la inversión a la tasa: proyectos que rendían más que la tasa vieja dejan de ser rentables con la nueva."},
{c:2,q:"En el flujo circular, los impuestos indirectos y directos se distinguen porque:",o:["Los indirectos gravan transacciones en el mercado de productos; los directos, ingresos y patrimonios en el mercado de factores","Los directos los pagan solo las empresas","Los indirectos son siempre más progresivos","Los directos se cobran en la aduana"],e:"IVA/IIBB gravan transacciones (mercado de productos); Ganancias/Bienes Personales gravan ingresos y patrimonio (mercado de factores)."},
// ---- CLASE 3 ----
{c:3,q:"Una curtiembre contamina un río y afecta a poblaciones que no participan del negocio. Es un caso de:",o:["Externalidad negativa: el costo recae sobre terceros ajenos a la transacción","Bien público","Información asimétrica","Competencia imperfecta"],e:"El precio de mercado del cuero no incorpora el daño a terceros: falla de mercado por externalidad, corregible con regulación o impuestos correctivos."},
{c:3,q:"El contrapunto '¿y las fallas del Estado?' advierte que:",o:["La intervención estatal para corregir fallas de mercado puede fallar a su vez y empeorar el resultado","El Estado nunca debe intervenir","Las fallas de mercado no existen","Toda intervención estatal mejora el bienestar por definición"],e:"Identificar una falla de mercado no garantiza que la corrección estatal sea eficaz: la intervención tiene sus propios costos e incentivos."},
{c:3,q:"Se fija un precio máximo por debajo del equilibrio 'para ayudar al consumidor'. El resultado previsible es:",o:["Escasez y racionamiento: a ese precio la cantidad demandada supera a la ofrecida","Excedente de producción sin vender","Más oferta, porque el precio bajo atrae competidores","El mismo equilibrio, porque los precios legales no afectan al mercado"],e:"Precio máximo bajo el equilibrio → exceso de demanda → escasez, colas, mercados paralelos. Precio mínimo genera el problema espejo (excedente)."},
{c:3,q:"De las tres opciones de política (no intervenir / controlar precios / impuestos + transferencias), la clase concluye que para buscar equidad conviene:",o:["Impuestos y transferencias: persiguen equidad sin distorsionar el sistema de precios","Controlar precios, porque llega directo al consumidor","No intervenir nunca, la equidad no es objetivo de política","Combinar control de precios con subsidios cruzados"],e:"'No se hace política social distorsionando el sistema de precios; para eso existen los impuestos y el gasto público.'"},
{c:3,q:"'Vamos a subir Bienes Personales para financiar el aumento a los jubilados.' La objeción conceptual central es:",o:["La fungibilidad del dinero: lo recaudado se mezcla en las arcas del Estado y no financia un gasto específico aislado","Que Bienes Personales es un impuesto indirecto","Que las jubilaciones no forman parte del gasto público","Que los impuestos no pueden subir por ley"],e:"El dinero público no está 'etiquetado': la asignación entre ingresos y gastos específicos es retórica política, no realidad contable."},
{c:3,q:"El municipio cobra un monto por el servicio de recolección de residuos que efectivamente presta. Técnicamente es:",o:["Una tasa: hay relación directa con un servicio prestado","Un impuesto: no requiere contraprestación","Una contribución especial","Un ingreso no tributario"],e:"Impuesto: sin contraprestación directa. Tasa: ligada a un servicio. Contribución: beneficio a un grupo determinado."},
{c:3,q:"Un país tiene superávit primario de 1% del PBI y paga intereses por 3% del PBI. Su resultado financiero es:",o:["Déficit de 2% del PBI: el financiero suma los intereses al primario","Superávit de 1%, porque los intereses no cuentan","Déficit de 3%","Superávit de 4%"],e:"RF financiero = RF primario − intereses = 1 − 3 = −2. Se puede tener superávit primario y déficit financiero a la vez."},
{c:3,q:"En el esquema AIF, el orden correcto de construcción del resultado es:",o:["Ingresos totales − gastos primarios = resultado primario; − intereses = resultado financiero","Ingresos − intereses = primario; − gastos = financiero","Ingresos − gastos totales = primario","Resultado financiero + intereses = necesidades netas"],e:"El primario excluye intereses por diseño; restándolos se llega al financiero, que define las necesidades de financiamiento."},
{c:3,q:"Los dos límites de financiar déficits con emisión y con deuda son, respectivamente:",o:["La demanda de dinero (inflación) y la sostenibilidad de la deuda (default)","La recaudación y el gasto social","El tipo de cambio y las reservas","La tasa de interés internacional y el riesgo país"],e:"Emitir más allá de lo que la gente demanda genera inflación; endeudarse sin sendero sostenible termina en default."},
{c:3,q:"El Tesoro coloca deuda nueva por USD 10.000 M que usa íntegramente para pagar vencimientos de deuda vieja por el mismo monto. El endeudamiento neto:",o:["Es cero: solo refinanció; la deuda no creció","Es de USD 10.000 M, porque tomó deuda nueva","Es negativo, porque canceló deuda","No puede calcularse sin conocer la tasa"],e:"Endeudamiento neto = fuentes − aplicaciones financieras. Refinanciar vencimientos no agranda el stock; trampa 'tomar deuda = endeudarse'."},
{c:3,q:"Con la fórmula rf_p = d·(i−γ)/(1+γ): deuda 80% del PBI, tasa 8%, crecimiento 3% exigen superávit primario ≈ 3,9%. Si el crecimiento sube a 5%, el esfuerzo requerido:",o:["Baja (≈2,3%): el crecimiento 'licúa' la deuda en términos de PBI","Sube, porque crecer exige más gasto público","Queda igual: el crecimiento no entra en la fórmula","Se duplica"],e:"Cuanto mayor γ frente a i, menor superávit primario se necesita para estabilizar d. El crecimiento es el mejor aliado fiscal."},
{c:3,q:"Si la tasa de interés de la deuda es MENOR que la tasa de crecimiento del PBI (i < γ), un país puede:",o:["Mantener estable su ratio deuda/PBI incluso con un pequeño déficit primario","Necesitar igual un gran superávit primario","Entrar automáticamente en default","Estabilizar la deuda solo con emisión"],e:"Con i < γ el término d·(i−γ)/(1+γ) es negativo: el rf_p requerido es un déficit. El denominador dinámico crece más rápido que los intereses."},
{c:3,q:"Un impuesto recae legalmente sobre los vendedores. ¿Quién soporta realmente la carga?",o:["El lado más inelástico del mercado, sin importar sobre quién recae legalmente","Siempre el vendedor, que es el sujeto legal","Siempre el consumidor, vía precios","Se reparte en mitades exactas"],e:"Incidencia fiscal: gravar a vendedores o compradores da idéntico resultado; paga más quien menos puede ajustar cantidades (el inelástico)."},
{c:3,q:"La construcción de una autopista figura en el presupuesto como:",o:["Gasto de capital: inversión pública que aumenta el activo fijo","Gasto corriente: es un gasto del año","Transferencia","Servicio de la deuda"],e:"Clasificación económica: corriente = consumo/funcionamiento; capital = inversión que incrementa activos."},
{c:3,q:"La clasificación FUNCIONAL del gasto público responde a la pregunta:",o:["¿Para qué/en qué área se gasta? (salud, educación, seguridad, etc.)","¿Qué nivel de gobierno gasta?","¿Es gasto corriente o de capital?","¿Con qué impuesto se financia?"],e:"Administrativa: quién gasta (Nación/provincia/municipio). Económica: en qué tipo (corriente/capital). Funcional: para qué finalidad."},
// ---- CLASE 4 ----
{c:4,q:"El período 2003-2008 en Argentina se conoce como 'años de superávit gemelo' porque coexistieron:",o:["Superávit fiscal primario y financiero (y también superávit externo)","Superávit comercial y déficit fiscal","Superávit primario con déficit financiero","Dos superávits provinciales"],e:"Excepción histórica: superávit primario (~4% del PBI en el pico) y financiero simultáneos, en una serie 1961-2025 dominada por déficits."},
{c:4,q:"Argentina gasta en jubilaciones ~2,2 veces lo que 'correspondería' según su proporción de mayores de 65 años. La lectura correcta es:",o:["Gasta como un país mucho más envejecido de lo que es, por moratorias y regímenes especiales","Tiene la población más envejecida del mundo","Sus jubilaciones individuales son las más altas del mundo","El dato prueba que el sistema es superavitario"],e:"El desvío no lo explica la demografía sino el diseño: moratorias, más de 200 regímenes fragmentados y reglas de acceso laxas."},
{c:4,q:"Con oferta agrícola inelástica en el corto plazo, las retenciones (DEX) a la soja recaen principalmente sobre:",o:["El productor local, que absorbe la brecha entre precio internacional y precio interno","El consumidor chino que compra la soja","El Estado, que las paga con emisión","Los puertos exportadores"],e:"Aplicación directa de incidencia: el lado inelástico (el productor, que no puede reasignar producción rápido) carga con el impuesto: Chicago vs. Rosario."},
{c:4,q:"La presión tributaria efectiva argentina ronda 28-31% del PBI, pero corregida por evasión sería ~45%. Eso implica que:",o:["Quien está en la formalidad soporta alícuotas legales propias de una presión mucho mayor a la efectiva","Argentina tiene baja presión tributaria para quien cumple","La evasión no afecta la equidad del sistema","La presión efectiva supera a la de la OCDE"],e:"La brecha efectiva/potencial revela la sobrecarga sobre el contribuyente formal y el premio implícito a la informalidad."},
{c:4,q:"La evasión de IVA en Argentina (37%) duplica o triplica la de Chile (19%) y Uruguay (15%). Converger al nivel regional permitiría recuperar aproximadamente:",o:["4 puntos del PBI de recaudación","0,5 puntos del PBI","15 puntos del PBI","Nada: la evasión no es recaudación perdida"],e:"El 'recupero' potencial estimado en la clase es ~4% del PBI, comparable al costo fiscal de reformas enteras."},
{c:4,q:"Argentina recauda 7,7% del PBI en impuestos 'súper-distorsivos' (IIBB, DEX, cheque) contra 0,8% en la OCDE. El componente más grande y persistente es:",o:["Ingresos Brutos (~4,1 puntos), el que 'no cambia'","Los derechos de exportación","El impuesto al cheque","El impuesto inmobiliario"],e:"IIBB es el corazón del problema: piramidal, acumulativo, provincial y políticamente cómodo; los DEX venían en reducción."},
{c:4,q:"Que Argentina integre el grupo de ~8 jurisdicciones que aún aplican impuestos piramidales sobre ventas (con Corea del Norte, Surinam, Etiopía…) señala que:",o:["Sostiene tributos que el consenso internacional abandonó por su efecto cascada sobre los precios","Está a la vanguardia tributaria mundial","Los impuestos en cascada son la norma en la OCDE","La comparación no tiene implicancias de eficiencia"],e:"Los impuestos acumulativos gravan cada eslabón sobre lo ya gravado, distorsionando la integración productiva; casi todo el mundo migró a IVA puro."},
{c:4,q:"La participación del impuesto a los ingresos personales en la recaudación argentina (4-8%) es muy baja contra la OCDE (~24%). Una causa central discutida en la clase es:",o:["Mínimos no imponibles comparativamente muy altos, que dejan a pocos asalariados alcanzados","Que las alícuotas argentinas son las más bajas del mundo","Que el impuesto no existe en Argentina","Que la OCDE no grava el trabajo"],e:"El mínimo no imponible medido contra salario mínimo o ingreso promedio resultó altísimo en varios períodos: los puestos gravados llegaron a ser 1-2% del empleo formal."},
{c:4,q:"La estructura tributaria provincial pasó de 47% (2000) a 77% (2024) de dependencia de IIBB. La clase lo explica con la lógica de:",o:["Impuestos 'malos' pero invisibles (fáciles de subir) desplazando a impuestos 'buenos' pero visibles (costosos políticamente)","Una mejora de eficiencia recaudatoria","La eliminación del impuesto inmobiliario por ley nacional","Un mandato de la coparticipación"],e:"El contribuyente no percibe cuánto IIBB paga en cada precio; sí percibe el inmobiliario o las patentes. El sesgo político favorece lo invisible."},
{c:4,q:"'La coparticipación redistribuye de provincias ricas a pobres.' El matiz que muestra el cruce PBG per cápita vs. fondos per cápita es:",o:["Hay componente redistributivo real, pero la relación no es uniforme: hay provincias favorecidas y castigadas sin correlato estricto con su riqueza","La frase es totalmente falsa: no hay redistribución alguna","La redistribución es perfecta y lineal","Las provincias ricas reciben más per cápita que las pobres siempre"],e:"Formosa recibe 4-5 veces lo que aporta y CABA/Neuquén/PBA aportan más de lo que reciben, pero el patrón general tiene anomalías: evaluar con matices."},
{c:4,q:"En la composición de la deuda de la Administración Central (abr-2026), la porción dominante corresponde a:",o:["Títulos públicos (~67%), seguidos por acreedores oficiales externos (~20%)","El FMI con más del 50%","Adelantos transitorios del BCRA","Letras del Tesoro con 80%"],e:"Títulos 67%, oficiales externos 20%, Letras 11%, BCRA y otros ~2%. La deuda intra-sector público creció fuerte tras 2005."},
{c:4,q:"El perfil mensual de vencimientos de la deuda argentina (picos de hasta ~USD 25.000 M en un mes) implica un riesgo específico de:",o:["Refinanciamiento (rollover): concentración de vencimientos que exige acceso al mercado en momentos puntuales","Inflación por emisión automática","Apreciación cambiaria","Caída de la recaudación"],e:"Aun con solvencia de fondo, la concentración de vencimientos genera riesgo de liquidez si el mercado se cierra justo en el pico."},
// ---- CLASE 5 ----
{c:5,q:"Un país tiene déficit de cuenta corriente y su cuenta financiera está cerrada (no entran capitales). Por la identidad BdP = CC + CF = ΔRRII:",o:["Pierde reservas internacionales: el déficit se paga con ΔRRII negativa","Acumula reservas","El déficit de CC es imposible en ese caso","El tipo de cambio no puede moverse"],e:"Sin financiamiento externo (CF), el exceso de gasto sobre ingreso externo se cubre vendiendo reservas. Es la antesala de las crisis de BdP."},
{c:5,q:"La diferencia esencial entre la Balanza de Pagos y la Posición de Inversión Internacional (PII) es que:",o:["La BdP registra flujos de un período; la PII es un stock: activos y pasivos frente a no residentes en un momento dado","La PII solo registra comercio de bienes","La BdP es un stock y la PII un flujo","Son el mismo estado contable con distinto nombre"],e:"PII positiva = país acreedor neto; negativa = deudor neto. Varía por los flujos de la CF pero también por valuación de activos."},
{c:5,q:"El YNFE (ingreso neto de factores externos) dentro de la CC incluye:",o:["Rentas, intereses, utilidades y transferencias con el resto del mundo (IP + IS)","Solo las exportaciones de servicios","La inversión extranjera directa","La variación de reservas"],e:"CC = BC + IP + IS. La IED va en la cuenta financiera, no en la corriente."},
{c:5,q:"'Hay que proteger a los empresarios argentinos de la competencia internacional, pero que no suban los precios.' La frase es contradictoria porque:",o:["La protección funciona precisamente permitiendo que el precio interno supere al internacional: ese ES el mecanismo protector","Los empresarios argentinos no compiten con el exterior","La apertura siempre sube los precios","Los precios los fija el Estado"],e:"En economía cerrada el equilibrio es a p* > pa. Pedir protección y precios bajos a la vez es pedir el mecanismo sin su consecuencia."},
{c:5,q:"'Abrir la economía baja la inflación.' Según la evidencia de la clase (caso indumentaria), la formulación precisa es:",o:["La apertura baja los precios RELATIVOS de los transables, no necesariamente la inflación (nivel general)","La apertura baja la inflación de una vez y para siempre","La apertura sube los precios de los transables","La apertura no tiene efecto alguno sobre precios"],e:"En cada período de apertura el precio relativo de la ropa cayó; la inflación depende de la macro monetaria-fiscal, no del régimen comercial."},
{c:5,q:"La suspensión de exportaciones de carne (2006) ilustra el patrón de las intervenciones sobre precios porque:",o:["Bajó el precio en el corto plazo, pero destruyó stock ganadero y exportaciones, y a la larga el asado subió 123% contra un IPC de 28%","Logró carne barata de forma permanente","No tuvo ningún efecto de corto plazo","Aumentó las exportaciones al liberar oferta interna"],e:"Efecto CP vs. LP: la señal de precios destruida desincentivó inversión (stock de 58 a 48 M de cabezas) y generó escasez estructural."},
{c:5,q:"Medida por importaciones per cápita contra el mundo y la región, Argentina es una economía:",o:["Comparativamente cerrada: por debajo del promedio mundial y muy por debajo de los grandes de LATAM","De las más abiertas del mundo","Exactamente igual de abierta que Chile","Abierta en bienes pero cerrada solo en servicios"],e:"Contra la percepción común, Argentina importa per cápita ~55% del promedio mundial histórico y menos que Brasil/Chile/Colombia/Perú."},
{c:5,q:"En el enfoque absorción, un déficit de cuenta corriente significa que:",o:["El país absorbe (C+I+G) más de lo que produce, y financia la diferencia con ahorro externo","El país exporta más de lo que importa","El tipo de cambio está alto","La economía produce más de lo que gasta"],e:"CC = YN − AI. Si YN < AI, hay −CC: el exceso de gasto interno lo presta el resto del mundo."},
{c:5,q:"El sector privado está en equilibrio (S = I) y el fisco tiene déficit de 3% del PBI. Por CC = BSPriv + RFpub, la cuenta corriente:",o:["Es deficitaria en 3% del PBI: el déficit fiscal 'se exporta' como déficit externo (déficits gemelos)","Es superavitaria en 3%","Queda en cero","No guarda relación con el resultado fiscal"],e:"Los tres balances cierran contablemente: con privado en cero, el déficit público se financia con ahorro externo → déficit de CC."},
{c:5,q:"Tipo de cambio nominal, tipo de cambio real y términos de intercambio miden, respectivamente:",o:["Relación entre monedas; competitividad-precios contra el exterior; precio de exportaciones vs. importaciones","Competitividad; monedas; inflación","Lo mismo con tres nombres","Reservas; deuda; comercio"],e:"E = $/USD; ER = E·P^f/P; TI = Px/Pq. Tres conceptos distintos que el examen suele mezclar."},
{c:5,q:"El tipo de cambio nominal sube 10% y los precios domésticos suben 10% (precios internacionales quietos). El tipo de cambio real:",o:["Queda igual: la devaluación nominal fue absorbida íntegramente por la inflación","Sube 10%","Sube 20%","Cae 10%"],e:"ER = E·P^f/P: numerador y denominador suben lo mismo. Devaluar sin efecto real es exactamente el riesgo argentino típico."},
{c:5,q:"'Una racha de términos de intercambio favorables puede maquillar la CC.' La recomendación de política que se deriva es:",o:["No gastar los 'vientos de cola': constituir fondos anticíclicos porque la mejora puede ser transitoria","Aumentar el gasto permanente aprovechando la bonanza","Cerrar la economía mientras duren los buenos precios","Fijar el tipo de cambio"],e:"Si el superávit depende de precios internacionales altos, tratarlo como permanente crea un desequilibrio latente cuando los precios revierten."},
{c:5,q:"Un régimen donde el banco central deja flotar el TC pero interviene discrecionalmente comprando y vendiendo divisas se denomina:",o:["Flotación administrada o 'sucia'","Caja de conversión","Crawling peg","Dolarización"],e:"Regímenes: fijos extremos (dolarización, caja), flotación pura, e intermedios (fijo ajustable, crawling peg, bandas, flotación administrada)."},
{c:5,q:"La balanza comercial energética argentina pasó de −USD 10.700 M (2013-14) a +USD 10.400 M. El driver central fue:",o:["El desarrollo de Vaca Muerta, que revirtió las importaciones de gas y sumó exportaciones","La caída del consumo interno de energía","Una suba del precio internacional del petróleo","Los subsidios a las tarifas"],e:"El vuelco de ~USD 21.000 M del saldo energético es un cambio estructural de la restricción externa argentina."},
{c:5,q:"'Hay que corregir el atraso cambiario y aumentar los salarios en dólares.' El problema lógico es que:",o:["El TCR y el salario en dólares son espejo: subir el tipo de cambio real ES bajar el salario en dólares","Los salarios no se pueden medir en dólares","El atraso cambiario no existe como concepto","Ambas cosas dependen solo del FMI"],e:"La serie ITCRM vs. salario en dólares (1996-2025) se mueve en oposición casi perfecta: son la misma variable de dos lados."},
{c:5,q:"La relación histórica entre TCR y participación asalariada en el producto (Rapetti, 1945-2018) es:",o:["Inversa: TCR alto coincide con menor participación asalariada (salarios reales bajos, rentabilidad de transables alta)","Directa: TCR alto sube la participación asalariada","Nula: no hay relación","Directa solo en dictaduras"],e:"El TCR es también una variable distributiva: devaluar redistribuye contra el salario. Base del conflicto distributivo argentino."},
{c:5,q:"En el esquema de Gerchunoff y Rapetti, el 'conflicto' surge cuando:",o:["El TCR de equilibrio externo (qE) supera al TCR de equilibrio social (qS): la macro exige un dólar más alto que el que tolera la puja distributiva","qS supera a qE","Las políticas expansivas eliminan ambos equilibrios","El TCR es único y estable"],e:"Con qE > qS, el país oscila: dólar alto insostenible socialmente o dólar bajo insostenible externamente. Las políticas expansivas agrandan la brecha."},
{c:5,q:"Según la evidencia comparada (Heymann), la diferencia entre las devaluaciones de Argentina y las de Brasil o Chile es que:",o:["En los vecinos la devaluación nominal se vuelve mayormente ganancia de TCR; en Argentina se traslada rápido a inflación y la ganancia real se licúa","En los vecinos las devaluaciones generan más inflación","Argentina nunca devaluó","Los vecinos tienen tipo de cambio fijo"],e:"El pass-through argentino es alto por historia inflacionaria e indexación; solo 2002 (contratos rotos, desempleo altísimo) logró mejora real persistente."},
// ---- CLASE 6 ----
{c:6,q:"En F = F(i − i^f) con F' > 0, si la tasa doméstica queda por debajo de la internacional, se espera:",o:["Salida neta de capitales: los inversores migran al rendimiento mayor","Ingreso neto de capitales","Acumulación automática de reservas","Apreciación del tipo de cambio"],e:"Los flujos siguen el diferencial de rendimientos. i < i^f → F negativo (salida)."},
{c:6,q:"La ventaja central de tener abierta la cuenta financiera es que:",o:["Permite sostener déficits de CC (absorber más de lo producido) sin gastar reservas, porque el capital externo financia la brecha","Garantiza superávit comercial","Elimina el riesgo país","Fija el tipo de cambio"],e:"BP = CC + CF = ΔRRII: con CF positiva, un −CC no exige vender reservas. El país 'importa ahorro'."},
{c:6,q:"La paridad descubierta de tasas (UIP) establece que la tasa doméstica de una economía chica tiende a:",o:["i = i^f + devaluación esperada + riesgo país","i = i^f, siempre y exactamente","i = inflación + crecimiento","i = tasa de política de la Fed sin ajustes"],e:"Para que un inversor sea indiferente entre el bono local y el externo, la tasa local debe compensar la devaluación esperada y la prima de riesgo."},
{c:6,q:"TC fijo $1=USD1, tasas de ambos bonos 5%, devaluación esperada 10%. ¿Qué tasa en pesos iguala el rendimiento en dólares del bono local con el bono externo?",o:["15%: debe cubrir la tasa internacional más la devaluación esperada","5%: las tasas ya son iguales","10%: solo la devaluación","20%: el doble de la devaluación"],e:"(100+15)/1,1 = 105 USD, igual que el bono en dólares. Con 5%, el bono en pesos rinde solo 95,5 USD."},
{c:6,q:"Si un régimen de tipo de cambio fijo es totalmente creíble, entonces:",o:["La devaluación esperada es cero y la tasa local puede converger a la internacional (más riesgo país)","La devaluación esperada es máxima","El riesgo país desaparece automáticamente","La UIP deja de valer"],e:"dev^e = (E^e − E)/E = 0 si nadie espera que el TC se mueva. La credibilidad ES la variable: si se pierde, dev^e > 0 y la tasa debe subir."},
{c:6,q:"En plena salida de capitales, el gobierno decide defender el TC fijo subiendo fuertemente la tasa de interés. El costo esperable es:",o:["Recesión: el crédito se encarece y la actividad cae, aunque el TC se sostenga","Inflación inmediata","Caída del riesgo país sin costo alguno","Aumento de la inversión productiva"],e:"Cada opción tiene su factura: tasa → recesión; soltar el TC → inflación y caída del salario real; mix → un poco de cada una."},
{c:6,q:"Si en cambio decide soltar el tipo de cambio fijo, el mecanismo por el que se frena la salida de capitales es:",o:["La devaluación ya ocurrida reduce la devaluación esperada futura, cerrando la brecha de la UIP","La devaluación aumenta las reservas","El riesgo país baja automáticamente","Los contratos se indexan solos"],e:"Una vez que E saltó, E^e − E se achica. El costo: inflación, salario real y recesión por el shock de precios."},
{c:6,q:"La FAE ('fuga' o formación de activos externos) aparece sistemáticamente cuando:",o:["La tasa local no cubre la suma de tasa internacional + devaluación esperada + riesgo país (se rompe la UIP)","Hay superávit fiscal","El riesgo país está en mínimos","Las tasas internacionales bajan"],e:"2007-08, 2011, 2018-19: cada episodio de dolarización masiva coincide con expectativas de devaluación y riesgo en alza no compensados por la tasa."},
{c:6,q:"Sobre los cepos cambiarios (2011-2015, 2019-2025), la lectura del curso es que:",o:["Reprimen la FAE pero no corrigen el desequilibrio de fondo: la demanda de dólares reaparece al levantarlos","Eliminan definitivamente la fuga de capitales","Son neutrales: no afectan la economía","Aumentan el ingreso de inversión extranjera directa"],e:"El cepo es un torniquete, no una cura: congela la manifestación del problema (la brecha de la UIP) sin resolver sus causas."},
{c:6,q:"'Aumentar un pasivo o bajar un activo son equivalentes para el patrimonio neto.' Aplicado al BCRA defendiendo el TC:",o:["Vender reservas (bajar activo) o endeudarse en dólares/swaps (subir pasivo) deterioran igual el balance del Central","Endeudarse es gratis mientras no se vendan reservas","Las reservas brutas son lo único que importa","El patrimonio del BCRA no puede deteriorarse"],e:"Por eso se miran las reservas NETAS: brutas altas con pasivos altos (swap, encajes) esconden un PN igual de débil."},
{c:6,q:"Las mediciones 'RIN' y 'RIN según el FMI' difieren, entre otras cosas, por:",o:["El tratamiento de los desembolsos del FMI, la valuación de oro y monedas, y qué pasivos a 12 meses se restan","El tipo de cambio usado para los pesos","La inclusión de los depósitos privados","Nada: son idénticas"],e:"El FMI resta pasivos solo si eran a 12 meses al momento de su emisión; también difieren desembolsos y valuación. Por eso las metas se pactan sobre una definición precisa."},
{c:6,q:"En la 'receta del FMI', el sentido económico de que el organismo financie la transición es:",o:["Evitar la sobrerreacción: sin financiamiento, tasa, devaluación y ajuste fiscal deben ser todos más violentos","Postergar el ajuste indefinidamente","Reemplazar el ajuste fiscal con deuda permanente","Fijar el tipo de cambio por estatuto"],e:"El puente financiero permite corregir −CC = BSPriv + RFpub con menos overshooting. 'Las exigencias del FMI nunca serán peores que quedar solo con el mercado huyendo.'"},
// ---- CLASE 7 ----
{c:7,q:"Sube fuerte el precio del tomate por una helada; el resto de los precios queda estable. Técnicamente eso es:",o:["Un cambio de precio relativo, no inflación: falta que el aumento sea generalizado y sostenido","Inflación de demanda","Inflación estructural","Hiperinflación sectorial"],e:"Inflación = aumento generalizado y sostenido del nivel de precios. Un precio puntual que sube es reacomodamiento relativo."},
{c:7,q:"Entre una inflación constante de 10% anual y una inflación que promedia 10% pero oscila entre −5% y +30%, la segunda es peor porque:",o:["La volatilidad impide planificar, distorsiona contratos y precios relativos aunque el promedio sea igual","El promedio es más alto","La primera no existe en la realidad","La deflación es siempre buena"],e:"El daño de la inflación crece con su variabilidad: incertidumbre sobre precios futuros, acortamiento de horizontes, primas de riesgo."},
{c:7,q:"El canal por el que la inflación daña el CRECIMIENTO de largo plazo es principalmente:",o:["Acorta el horizonte de decisión y castiga la inversión (nadie hunde capital sin previsibilidad de precios)","Sube los salarios reales","Aumenta las exportaciones","Reduce la recaudación nominal"],e:"Los otros dos costos: distribución (erosión del poder adquisitivo) y eficiencia micro (controles, precios relativos rotos)."},
{c:7,q:"La correlación dinero-inflación entre países es alta (~0,72). ¿Por qué eso NO cierra el debate entre teorías?",o:["Porque correlación no implica causalidad: la dirección (M→P o P→M) es exactamente lo que las teorías disputan","Porque la correlación es demasiado baja","Porque los datos son solo de países africanos","Porque la inflación no se puede medir"],e:"Monetaristas: la emisión causa la inflación. Estructuralistas y teoría de costos: la emisión convalida una inflación que nació en otro lado."},
{c:7,q:"Para que de M·V = P·Y se derive que la tasa de emisión determina la tasa de inflación (ΔM/M = ΔP/P), hay que suponer:",o:["Velocidad de circulación estable y producto fijo en pleno empleo","Que V crece con M","Que el producto responde uno a uno al dinero","Que los precios son rígidos"],e:"Con V̄ e Ȳ constantes, toda la variación de M va a P. Si hay capacidad ociosa (tramo keynesiano), parte va a cantidades y el vínculo se debilita."},
{c:7,q:"La Curva de Phillips ORIGINAL (relación negativa estable inflación-desempleo) dejó de observarse en EE.UU.:",o:["A partir de 1970, cuando conviven alta inflación y alto desempleo (estanflación)","En 1930, con la Gran Depresión","Nunca: sigue vigente tal cual","Solo durante las guerras"],e:"La nube de puntos post-1970 no muestra relación. La respuesta teórica fue incorporar expectativas: π = π^e − α(Un − U)."},
{c:7,q:"En la Phillips aumentada con expectativas adaptativas (π^e = π anterior), el desempleo bajo la tasa natural se asocia con:",o:["Inflación ACELERÁNDOSE período a período, no con un nivel alto y estable de inflación","Un nivel de inflación alto pero constante","Deflación","Inflación cero"],e:"π − π(−1) = −α(Un − U): mantener U < Un exige sorprender expectativas cada período → la inflación sube sin techo."},
{c:7,q:"El 'impuesto inflacionario' tiene como base imponible y tasa, respectivamente:",o:["Los saldos monetarios reales (M/P) y la tasa de inflación π","El PBI y la alícuota de IVA","Los depósitos bancarios y la tasa de interés","Los salarios y la tasa de devaluación"],e:"Recaudación = π·(M/P): el Estado licúa el valor del dinero que el público mantiene."},
{c:7,q:"La dinámica que lleva del financiamiento monetario del déficit al riesgo de hiperinflación es:",o:["La demanda de dinero cae, la base del impuesto se achica y la misma emisión rinde menos → hay que emitir cada vez más","La demanda de dinero sube y estabiliza los precios","La velocidad de circulación cae a cero","El déficit se financia solo"],e:"Es una espiral: huida del dinero → menos base → más emisión requerida → más inflación → más huida. Curva de Laffer del impuesto inflacionario."},
{c:7,q:"En la teoría de costos, ¿por qué la inflación NO se autoextingue tras el shock inicial?",o:["Porque la política monetaria convalida (expande M) para no aceptar la caída del producto, habilitando la espiral precios-salarios","Porque los costos suben solos indefinidamente","Porque los precios son perfectamente flexibles","Porque la demanda de dinero es infinita"],e:"Sin convalidación, el shock de costos sería un cambio de nivel con recesión. La convalidación lo transforma en proceso inercial."},
{c:7,q:"La crítica clave a la teoría de costos como explicación completa de la inflación es:",o:["No explica el PRIMER aumento de costos: describe la propagación, no necesariamente la causa (¿y de dónde salió la devaluación?)","Que los costos no afectan los precios","Que ignora la existencia de salarios","Que solo aplica a economías cerradas"],e:"Si el shock inicial es una devaluación, hay que explicar por qué se devaluó: la teoría puede estar contando el mecanismo, no el origen."},
{c:7,q:"¿Cuál de las siguientes es una premisa de la inflación estructural (CEPAL)?",o:["Los precios son inflexibles a la baja, por lo que todo reacomodamiento de precios relativos sube el nivel general","Los mercados son perfectamente competitivos","La oferta agropecuaria es perfectamente elástica","La demanda agregada debe crecer para que haya inflación"],e:"Premisas: cambios permanentes de precios relativos aun con DA constante, inflexibilidad a la baja, agro con oferta rígida, proceso 'naturalmente inflacionario'."},
{c:7,q:"En el mecanismo estructuralista, el eslabón que generaliza la suba del precio agrícola al resto de la economía es:",o:["El salario: el mayor costo de vida dispara demandas salariales que suben los costos industriales, trasladados a precios","El tipo de cambio fijo","La tasa de interés internacional","La política fiscal contractiva"],e:"Precio agro ↑ → costo de vida ↑ → salarios ↑ → costos industria ↑ → precios industria ↑ → el precio relativo del agro se vuelve a desacomodar → repite."},
{c:7,q:"'Convalidación o ratificación monetaria' significa, para el estructuralismo, que:",o:["El dinero se expande DESPUÉS y a consecuencia de la suba de precios, para evitar la recesión: la emisión es pasiva/endógena","El BCRA causa la inflación emitiendo primero","El Congreso ratifica el presupuesto","La inflación valida las metas del programa"],e:"Es el corazón del P→M: la economía 'necesita' más circulante para las mismas transacciones a precios más altos."},
{c:7,q:"Sobre el objetivo de la política económica, monetarismo y estructuralismo se oponen así:",o:["Monetarismo: la estabilidad de precios trae el crecimiento. Estructuralismo: crecimiento y estabilidad son incompatibles","Ambos priorizan el crecimiento sobre la estabilidad","Ambos priorizan la estabilidad","Ninguno tiene objetivo definido"],e:"Para el monetarismo, la estabilidad alarga horizontes y habilita ahorro e inversión; para la CEPAL, crecer implica necesariamente tensión de precios."},
{c:7,q:"Los ciclos de 'stop and go' se explican, en clave estructuralista, porque:",o:["El crecimiento expande las importaciones más que las exportaciones (oferta exportable rígida) → déficit de CC → devaluación → inflación → freno","La inflación monetaria encarece lo interno y atrasa el TC","El FMI impone frenos periódicos","Las exportaciones crecen más rápido que las importaciones"],e:"La lectura monetarista es la inversa: el descontrol monetario causa el desequilibrio externo. Mismo fenómeno, causalidad opuesta: eso ES el debate."},
{c:7,q:"'Una teoría que no es general, no es una teoría' se usa en el curso para criticar:",o:["A las explicaciones de costos y estructuralistas, que hoy tienen muy poco poder explicativo fuera de contextos específicos","A la teoría cuantitativa","A la curva de Phillips","A la contabilidad nacional"],e:"La síntesis del curso: la explicación monetaria simplifica en exceso, pero las heterodoxas fallan como teoría general; desatado el proceso, es difícil separar causas de propagadores."},
{c:7,q:"'¿Cuán exógena es verdaderamente la política monetaria?' La duda apunta a que la emisión puede estar forzada por:",o:["El déficit fiscal a monetizar o los intereses de la propia deuda del BCRA (caso argentino reciente)","Las expectativas racionales","El tipo de cambio flexible","Los contratos laborales"],e:"Si el BCRA emite para pagar los intereses de sus pasivos remunerados, el dinero es endógeno a su propio balance: el 'control de M' es más frágil de lo que asume el modelo."},
// ---- CLASE 8 ----
{c:8,q:"En la regla de Taylor, cuando la inflación supera la meta, la tasa nominal debe subir MÁS que la inflación porque:",o:["Solo así sube la tasa REAL, que es la que enfría la demanda (el término aπ·(π−π*) se suma sobre π)","La tasa nominal alta recauda más","El coeficiente ay lo exige","La regla busca fijar el tipo de cambio"],e:"i = π + r* + aπ(π−π*) + ay(y−ȳ): con aπ > 0, la respuesta es más que proporcional. Subir la nominal menos que la inflación es BAJAR la real: expansivo."},
{c:8,q:"La 'metáfora maradoniana' de la política monetaria describe:",o:["Manejar expectativas: como Maradona corriendo derecho al arco mientras los rivales se mueven por sus amagues, el BC mueve al mercado sin ejecutar cada cambio de tasa","Cambiar la tasa de interés todos los días","Intervenir en el mercado cambiario sin anunciarlo","Prometer metas que no se cumplen"],e:"La credibilidad hace que el anuncio (o el sesgo) trabaje por sí solo: los mercados ajustan precios anticipando al banco central."},
{c:8,q:"Comparando la respuesta post-COVID, Brasil, Chile y Perú desinflaron antes que EE.UU. porque:",o:["Subieron sus tasas antes (2021) y por encima de la inflación, asegurando tasas reales positivas; la Fed llegó tarde (2022)","Tenían tipo de cambio fijo","No sufrieron inflación","Aplicaron controles de precios exitosos"],e:"La lección: la desinflación exigió en todos los casos tasa real positiva sostenida; el timing de la reacción marcó la diferencia."},
{c:8,q:"La diferencia entre un programa de estabilización ortodoxo y uno heterodoxo es que el heterodoxo:",o:["Suma políticas de ingresos (acuerdos/anclas de precios y salarios) al ajuste fiscal y monetario","Reemplaza el ajuste fiscal por acuerdos de precios","No usa política monetaria","Solo aplica en hiperinflaciones"],e:"Heterodoxo = ortodoxo + políticas de ingresos. No es ajuste 'versus' acuerdos: es ajuste MÁS coordinación de expectativas."},
{c:8,q:"En la matriz de Dornbusch y Simonsen (1987), los 'poetas' son quienes intentan estabilizar con:",o:["Política de ingresos SIN austeridad fiscal (y los 'magos', sin ninguna de las dos)","Austeridad fiscal sin política de ingresos","Ambas herramientas a la vez","Ayuda del FMI exclusivamente"],e:"Ambas: Austral/Cruzado. Solo austeridad: FMI. Solo ingresos: poetas. Ninguna: magos. Congelar precios sin ancla fiscal es poesía."},
{c:8,q:"¿Cuál de estos NO figura entre los riesgos de fracaso de un programa de estabilización?",o:["Un superávit fiscal excesivo","Inconsistencia de diseño de algún instrumento","Oposición política y resistencia social","Falta de credibilidad y shocks externos (sequías, guerras)"],e:"Los riesgos listados: diseño, factores políticos, credibilidad y factores externos. El superávit sobra como riesgo: es el ancla."},
{c:8,q:"¿Por qué la meta fiscal compatible con la meta de inflación es condición de credibilidad?",o:["Si el fisco necesita financiamiento monetario o licuar deuda, el mercado descuenta que la meta de inflación se abandonará","Porque el FMI la exige en todos los casos","Porque el superávit fiscal baja los precios directamente","Porque la meta fiscal fija el tipo de cambio"],e:"Dominancia fiscal: sin consistencia fiscal, el anuncio monetario no es creíble y las expectativas no bajan (recordar Lucas)."},
{c:8,q:"Las 'anclas' (políticas de ingresos) fracasan cuando se usan como sustituto del ajuste porque:",o:["Congelan precios relativos que se atrasan hasta volverse insostenibles (tarifas, TC) o agrandan el déficit, y la inflación reprimida estalla","Reducen demasiado la inflación","Suben las expectativas de inflación por definición","Impiden el crecimiento del PBI"],e:"Son complemento para coordinar la transición, no sustituto del ajuste fiscal-monetario. El atraso tarifario/cambiario acumulado es la bomba típica."},
{c:8,q:"'La desinflación se retroalimenta' porque, al bajar la inflación:",o:["La demanda se vuelve más elástica (los consumidores comparan precios con mejor información) y cae el pass-through de costos a precios","La emisión aumenta sin costo","El desempleo sube automáticamente","Los contratos se indexan más"],e:"Con precios estables, remarcar cuesta clientes: el poder de fijación de precios se disciplina solo. Círculo virtuoso de la estabilidad."},
{c:8,q:"La 'tasa de sacrificio' (1/α en el modelo de la clase) mide:",o:["Cuántos puntos de desempleo por encima del natural cuesta cada punto de desinflación","Cuánta inflación genera cada punto de emisión","El costo fiscal del programa","La pérdida de reservas por punto de devaluación"],e:"De Δπ = α(Un − U): para Δπ = −1, se necesita U − Un = 1/α. Si es alta, la desinflación se reparte en varios años."},
{c:8,q:"En el ejemplo de la crítica de Lucas: con π^e = 15% (adaptativas), bajar la inflación a 5% exige desempleo de 16%; con credibilidad que baje π^e a 10%, alcanza con 11%. La conclusión es:",o:["La credibilidad del programa reduce el costo real de desinflar porque las expectativas hacen parte del trabajo","La desinflación nunca tiene costos","Las expectativas no afectan la inflación","El desempleo natural cambia con la credibilidad"],e:"5 = 15 + 1·(6−16) vs. 5 = 10 + 1·(6−11): mismo objetivo, la mitad del exceso de desempleo. La clave es un programa creíble."},
{c:8,q:"El punto de Fischer-Taylor (rigideces nominales) contra el optimismo de Lucas es que:",o:["Aunque el banco central sea totalmente creíble, los contratos ya firmados determinan la inflación de los próximos meses: parte del costo es inevitable","La credibilidad es imposible de lograr","Los contratos se renegocian instantáneamente","Las expectativas no existen"],e:"No es un problema de credibilidad sino de contratos superpuestos: 'nadie quiere perder su posición relativa'. La inercia tiene raíz contractual."},
{c:8,q:"El 'desagio' del Plan Austral (1985) fue el intento de resolver el problema de Fischer-Taylor mediante:",o:["La conversión forzosa de contratos ya firmados, descontando la inflación esperada que traían incorporada, para desmontar la inercia","Un congelamiento de salarios por decreto sin tocar contratos","Una dolarización de los contratos","La eliminación del índice de precios"],e:"Si los contratos viejos traen la inflación vieja 'adentro', romper la inercia exige reescribirlos: eso hizo el desagio."},
{c:8,q:"Entre noviembre de 2023 y abril de 2026 la dispersión de precios relativos argentinos (atrasados vs. adelantados) se comprimió fuertemente. ¿Por qué eso importa para la sostenibilidad de la desinflación?",o:["Porque los precios muy atrasados (tarifas, TC oficial) son inflación futura contenida: sin corregirlos, su reacomodamiento inevitable reaviva la inflación","Porque la dispersión de precios no guarda relación con la inflación","Porque los precios adelantados deben subir aún más","Porque la compresión demuestra que hubo congelamiento"],e:"Recordar Fischer-Taylor y las anclas: estabilizar congelando precios relativos rotos deja la corrección pendiente. Normalizar el set es condición de duración."},
{c:8,q:"Frente a una hiperinflación (contratos cortísimos, inercia baja) versus una inflación moderada indexada (contratos largos, inercia alta), la estrategia sugerida es:",o:["Shock en la hiper (la inercia no ancla nada) y más gradualismo/coordinación en la moderada (los contratos imponen costos)","Gradualismo en la hiper y shock en la moderada","Shock en ambas siempre","Gradualismo en ambas siempre"],e:"La inercia contractual define el costo del shock: donde no hay contratos largos, el shock es barato; donde abundan, la desinflación brusca es recesiva."},
{c:8,q:"'Lo mejor es evitar la inflación' cierra el curso porque:",o:["Corregir la inflación es difícil y costoso (tasa de sacrificio, contratos, credibilidad), mientras que mantenerla baja es relativamente fácil","La inflación baja no requiere ninguna política","Los programas de estabilización nunca funcionan","La inflación es siempre importada"],e:"La asimetría es la lección: los costos de estabilizar (recesión, conflicto distributivo, riesgo de fracaso) superan largamente el esfuerzo de no desestabilizar."},
];
// ====== MOTOR ======
const TANDA_SIZE=25;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const rng=mulberry32(20260722);
function shuffle(arr,r){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
// preparar preguntas: barajar opciones y orden global (semilla fija => tandas estables por sesión)
const QUESTIONS=shuffle(BANK.map((it,idx)=>{
  const opts=it.o.map((t,i)=>({t,correct:i===0}));
  const so=shuffle(opts,rng);
  return{id:idx,c:it.c,q:it.q,opts:so,ans:so.findIndex(o=>o.correct),e:it.e};
}),rng);
const NT=Math.ceil(QUESTIONS.length/TANDA_SIZE);
const tandas=[];for(let i=0;i<NT;i++)tandas.push(QUESTIONS.slice(i*TANDA_SIZE,(i+1)*TANDA_SIZE));
const best={}; // resultados en memoria de la sesión
let state={view:"home",t:0,i:0,sel:{}};
const app=document.getElementById("app");
const LET=["A","B","C","D"];
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;")}
function render(){
 if(state.view==="home")return home();
 if(state.view==="quiz")return quiz();
 if(state.view==="result")return result();
}
function home(){
 app.innerHTML=`<header><div class="eyebrow">CIAS · Instituto Universitario</div>
 <h1>Simulador de examen — Macroeconomía</h1>
 <div class="sub">${QUESTIONS.length} preguntas de opción múltiple sobre las Clases 1 a 8 (Lic. Matías Surt). Elegí una tanda, respondé las ${TANDA_SIZE} y corregí al final: cada pregunta trae su explicación.</div></header>
 <div class="grid">${tandas.map((t,i)=>{
   const b=best[i];
   return`<div class="tcard" onclick="startTanda(${i})">
     <div class="badge ${b?'done':''}">${b?Math.round(100*b.score/t.length)+'%':'—'}</div>
     <h3>Tanda ${i+1}</h3><div class="n">${t.length} preguntas · todas las clases</div>
     <div class="score ${b?'':'empty'}">${b?`Mejor resultado: ${b.score}/${t.length}`:'Sin intentos en esta sesión'}</div></div>`
 }).join("")}</div>
 <footer>Las preguntas mezclan identidades contables, casos aplicados y las frases-trampa marcadas en clase. El orden de opciones está barajado. Los resultados viven solo en esta sesión del navegador.</footer>`;
}
window.startTanda=(t)=>{state={view:"quiz",t,i:0,sel:{}};render();};
function quiz(){
 const T=tandas[state.t],q=T[state.i],n=Object.keys(state.sel).length;
 app.innerHTML=`<header><div class="eyebrow">Tanda ${state.t+1} de ${NT}</div>
 <h1 style="font-size:22px">Pregunta ${state.i+1} <span style="color:var(--mut);font-weight:400">/ ${T.length}</span></h1>
 <div class="progress"><i style="width:${100*n/T.length}%"></i></div></header>
 <span class="chip">Clase ${q.c}</span>
 <div class="qcard"><div class="qtext">${esc(q.q)}</div>
 ${q.opts.map((o,j)=>`<button class="opt ${state.sel[state.i]===j?'sel':''}" onclick="pick(${j})"><span class="key">${LET[j]}</span>${esc(o.t)}</button>`).join("")}
 </div>
 <div class="nav">
  <button class="btn ghost" onclick="mv(-1)" ${state.i===0?'disabled':''}>← Anterior</button>
  ${state.i<T.length-1
   ?`<button class="btn" onclick="mv(1)">Siguiente →</button>`
   :`<button class="btn" onclick="grade()" ${n<T.length?'disabled title="Respondé todas para corregir"':''}>Corregir tanda</button>`}
 </div>
 <div class="dots">${T.map((_,k)=>`<div class="dot ${state.sel[k]!=null?'ans':''} ${k===state.i?'cur':''}" onclick="go(${k})">${k+1}</div>`).join("")}</div>
 <div class="back"><button class="btn ghost" onclick="quitQ()">Salir sin corregir</button></div>`;
}
window.pick=(j)=>{state.sel[state.i]=j;const T=tandas[state.t];if(state.i<T.length-1){state.i++;}render();};
window.mv=(d)=>{state.i+=d;render();};
window.go=(k)=>{state.i=k;render();};
window.quitQ=()=>{if(confirm("¿Salir? Se pierden las respuestas de esta tanda.")){state={view:"home"};render();}};
window.grade=()=>{
 const T=tandas[state.t];let s=0;
 T.forEach((q,k)=>{if(state.sel[k]===q.ans)s++});
 if(!best[state.t]||s>best[state.t].score)best[state.t]={score:s};
 state.view="result";state.score=s;render();window.scrollTo(0,0);
};
function verdict(p){
 if(p>=0.9)return"Nivel de defensa de tesis. Dominás las identidades y las trampas.";
 if(p>=0.75)return"Sólido. Repasá los ítems fallados: suelen ser las distinciones finas (primario/financiero, TCN/TCR, causa/propagación).";
 if(p>=0.55)return"Base razonable, pero el examen ataca justo donde fallaste. Releé las secciones de esas preguntas en la guía.";
 return"Volvé a la guía antes de la próxima tanda: las preguntas apuntan a razonar identidades, no a memorizar.";
}
function result(){
 const T=tandas[state.t],s=state.score,p=s/T.length;
 app.innerHTML=`<header><div class="eyebrow">Tanda ${state.t+1} · Resultado</div>
 <h1 style="font-size:24px">Corrección</h1></header>
 <div class="result-hero"><div class="lab">Puntaje</div><div class="big">${s} / ${T.length}</div>
 <div class="verdict">${verdict(p)}</div></div>
 <h2 style="font-family:Georgia,serif;font-size:19px;margin-top:26px">Revisión pregunta por pregunta</h2>
 ${T.map((q,k)=>{
  const u=state.sel[k],ok=u===q.ans;
  return`<div class="rev ${ok?'ok':'bad'}">
   <div class="mark ${ok?'ok':'bad'}">${ok?'✔ Correcta':'✘ Incorrecta'} · Clase ${q.c}</div>
   <div class="q">${k+1}. ${esc(q.q)}</div>
   ${ok?'':`<div class="a user-bad">Tu respuesta: <b>${LET[u]}</b> — ${esc(q.opts[u].t)}</div>`}
   <div class="a correct">Correcta: <b>${LET[q.ans]}</b> — ${esc(q.opts[q.ans].t)}</div>
   <div class="exp">${esc(q.e)}</div></div>`
 }).join("")}
 <div class="nav" style="margin-top:24px">
  <button class="btn ghost" onclick="startTanda(${state.t})">Reintentar tanda</button>
  <button class="btn" onclick="(function(){state={view:'home'};render();window.scrollTo(0,0)})()">Volver a las tandas</button>
 </div>`;
}
render();
</script>
</body>
</html>
